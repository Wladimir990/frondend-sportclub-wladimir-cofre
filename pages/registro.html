<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta | SportClub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="auth-page">
    <a href="login.html" class="auth-back">← Volver al login</a>

    <div class="auth-card" style="max-width: 500px;">
        <div class="auth-logo-area">
            <img src="../assets/img/logo.png" alt="SportClub" class="auth__logo-img">
            <h1 class="auth-title">Crear cuenta</h1>
            <p class="auth-sub">Comienza tu transformación hoy mismo</p>
        </div>

        <form class="auth-form" action="login.html" method="GET">

            <div class="form-group">
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" name="nombre"
                       placeholder="Ej: Javier Ahumada Pérez" required>
            </div>

            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email"
                       placeholder="ejemplo@sportclub.cl" required>
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono <span style="color:var(--text-muted); font-weight:400; text-transform:none; letter-spacing:0;">(opcional)</span></label>
                <input type="tel" id="telefono" name="telefono"
                       placeholder="+56 9 1234 5678">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password"
                       placeholder="Mínimo 6 caracteres" required>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirmar contraseña</label>
                <input type="password" id="confirm_password" name="confirm_password"
                       placeholder="Repite tu contraseña" required>
            </div>

            <!-- Mensajes de feedback visual (preparados para validaciones futuras) -->
            <div class="form-msg form-msg--error" id="msg-no-match" style="display: none;">
                ❌ Las contraseñas no coinciden. Inténtalo nuevamente.
            </div>
            <div class="form-msg form-msg--error" id="msg-email-inv" style="display: none;">
                ❌ El formato del correo electrónico no es válido.
            </div>
            <div class="form-msg form-msg--success" id="msg-ok" style="display: none;">
                ✅ ¡Usuario registrado correctamente! Redirigiendo al login...
            </div>

            <button type="submit" class="btn btn--gold form-submit">
                Crear mi cuenta →
            </button>
        </form>

        <p class="auth-footer-text">
            ¿Ya tienes una cuenta? <a href="login.html">Iniciar sesión</a>
        </p>
    </div>
</div>

</body>
</html>
