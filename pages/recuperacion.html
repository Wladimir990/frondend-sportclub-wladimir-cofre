<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña | SportClub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="auth-page">
    <a href="login.html" class="auth-back">← Volver al login</a>

    <div class="auth-card">
        <div class="auth-logo-area">
            <img src="../assets/img/logo.png" alt="SportClub" class="auth__logo-img">
            <h1 class="auth-title">Recuperar contraseña</h1>
            <p class="auth-sub">Ingresa tu correo y te enviaremos un enlace</p>
        </div>

        <!-- Sin action ni method — lo maneja el JS de abajo -->
        <form class="auth-form" id="form-recuperacion" novalidate>

            <div class="form-group">
                <label for="email">Correo electrónico registrado</label>
                <input type="email" id="email" name="email"
                       placeholder="ejemplo@sportclub.cl">
                <span class="form-field-error" id="err-email"
                      style="display:none;"></span>
            </div>

            <!-- Mensaje de error -->
            <div class="form-msg form-msg--error"
                 id="msg-error"
                 style="display:none;"></div>

            <!-- Mensaje de éxito — oculto hasta que se envíe -->
            <div class="form-msg form-msg--info"
                 id="msg-exito"
                 style="display:none;">
                📧 Se ha enviado un enlace de recuperación al correo ingresado.
                Por favor revisa también tu carpeta de spam.
            </div>

            <button type="submit"
                    class="btn btn--gold form-submit"
                    id="btn-recuperar">
                Enviar enlace de recuperación
            </button>
        </form>

        <p class="auth-footer-text">
            <a href="login.html">← Volver al inicio de sesión</a>
        </p>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {

    const form      = document.getElementById('form-recuperacion');
    const inputEmail = document.getElementById('email');
    const errEmail  = document.getElementById('err-email');
    const msgError  = document.getElementById('msg-error');
    const msgExito  = document.getElementById('msg-exito');
    const btn       = document.getElementById('btn-recuperar');

    form.addEventListener('submit', async (e) => {
        e.preventDefault(); // Evita que recargue la página

        // 1. Limpiar mensajes anteriores
        errEmail.style.display  = 'none';
        msgError.style.display  = 'none';
        msgExito.style.display  = 'none';

        // 2. Leer y validar el correo
        const email = inputEmail.value.trim();

        if (!email) {
            errEmail.textContent  = '❌ Debes ingresar tu correo.';
            errEmail.style.display = 'block';
            return;
        }

        const regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!regexEmail.test(email)) {
            errEmail.textContent  = '❌ El formato del correo no es válido.';
            errEmail.style.display = 'block';
            return;
        }

        // 3. Deshabilitar botón mientras procesa
        btn.disabled    = true;
        btn.textContent = 'Enviando...';

        // 4. Intentar llamar al backend
        //    Si el backend no tiene este endpoint, igual mostramos el mensaje
        try {
            await fetch('http://localhost:3000/api/auth/recover', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ email })
            });
        } catch (err) {
            // Si el backend no tiene el endpoint, no importa
            // igual mostramos la confirmación visual
            console.log('Backend sin endpoint de recuperación:', err.message);
        }

        // 5. Mostrar mensaje de confirmación y ocultar el formulario
        form.style.display   = 'none';
        msgExito.style.display = 'flex';

        // 6. Redirigir al login después de 3 segundos
        setTimeout(() => {
            window.location.href = 'login.html';
        }, 3000);
    });
});
</script>

</body>
</html>
