<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Iniciar Sesión | Mi Aplicación</title>
    <!-- Vinculación al archivo CSS externo -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Contenedor principal: tarjeta centrada (card) -->
    <div class="login-card">
        <!-- Logo centrado (requisito) -->
        <div class="logo-container">
            <div class="logo" aria-label="Logo de la empresa" role="img">
                <span>🚀</span>
                <!-- También se podría usar una imagen real: <img src="logo.svg" alt="Logo"> -->
            </div>
            <div class="welcome-text">Bienvenido</div>
        </div>

        <!-- Formulario de login con campos requeridos -->
        <form class="login-form" action="#" method="post" autocomplete="off">
            <!-- Input de correo (email) -->
            <div class="input-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="usuario@ejemplo.com" required>
            </div>

            <!-- Input de contraseña -->
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
            </div>

            <!-- Botón de inicio de sesión -->
            <button type="submit" class="btn-login">Iniciar sesión</button>

            <!-- Enlaces: recuperar contraseña y registrarse -->
            <div class="links-container">
                <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                <a href="#" class="register-link">Crear cuenta nueva</a>
            </div>
        </form>

        <div class="extra-note">
            Demo | Proyecto integrador
        </div>
    </div>
</body>

</html>
